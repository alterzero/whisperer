<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisperer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Whisperer</h1>
      <p class="subtitle">Local Speech to Text</p>
    </header>

    <!-- Model Section -->
    <div class="section">
      <label for="model-select">Whisper Model</label>
      <div class="input-row">
        <select id="model-select">
          <option value="onnx-community/whisper-tiny" selected>Tiny (~45 MB)</option>
          <option value="onnx-community/whisper-base">Base (~80 MB)</option>
          <option value="onnx-community/whisper-small">Small (~250 MB)</option>
          <option value="onnx-community/whisper-medium_timestamped">Medium (~400 MB q4)</option>
          <option value="onnx-community/whisper-large-v3-turbo">Large V3 Turbo (~500 MB q4)</option>
          <option value="onnx-community/whisper-large-v3-ONNX">Large V3 (~800 MB q4)</option>
        </select>
        <button id="load-model-btn" class="btn btn-small">Load</button>
      </div>
      <div id="model-status" class="model-status">
        <span id="model-status-text">Model not loaded</span>
      </div>
      <div id="progress-container" class="progress-container hidden">
        <div id="progress-bar" class="progress-bar"></div>
        <span id="progress-text" class="progress-text">0%</span>
      </div>
    </div>

    <!-- Language Section -->
    <div class="section">
      <label for="language-select">Language</label>
      <select id="language-select">
        <option value="auto">Auto-detect</option>
        <option value="en">English</option>
        <option value="zh">Chinese</option>
        <option value="de">German</option>
        <option value="es">Spanish</option>
        <option value="ru">Russian</option>
        <option value="ko">Korean</option>
        <option value="fr">French</option>
        <option value="ja">Japanese</option>
        <option value="pt">Portuguese</option>
        <option value="tr">Turkish</option>
        <option value="pl">Polish</option>
        <option value="ca">Catalan</option>
        <option value="nl">Dutch</option>
        <option value="ar">Arabic</option>
        <option value="sv">Swedish</option>
        <option value="it">Italian</option>
        <option value="id" selected>Indonesian</option>
        <option value="hi">Hindi</option>
        <option value="fi">Finnish</option>
        <option value="vi">Vietnamese</option>
        <option value="he">Hebrew</option>
        <option value="uk">Ukrainian</option>
        <option value="el">Greek</option>
        <option value="ms">Malay</option>
        <option value="cs">Czech</option>
        <option value="ro">Romanian</option>
        <option value="da">Danish</option>
        <option value="hu">Hungarian</option>
        <option value="ta">Tamil</option>
        <option value="no">Norwegian</option>
        <option value="th">Thai</option>
        <option value="ur">Urdu</option>
        <option value="hr">Croatian</option>
        <option value="bg">Bulgarian</option>
        <option value="lt">Lithuanian</option>
        <option value="la">Latin</option>
        <option value="mi">Maori</option>
        <option value="ml">Malayalam</option>
        <option value="cy">Welsh</option>
        <option value="sk">Slovak</option>
        <option value="te">Telugu</option>
        <option value="fa">Persian</option>
        <option value="lv">Latvian</option>
        <option value="bn">Bengali</option>
        <option value="sr">Serbian</option>
        <option value="az">Azerbaijani</option>
        <option value="sl">Slovenian</option>
        <option value="kn">Kannada</option>
        <option value="et">Estonian</option>
        <option value="mk">Macedonian</option>
        <option value="br">Breton</option>
        <option value="eu">Basque</option>
        <option value="is">Icelandic</option>
        <option value="hy">Armenian</option>
        <option value="ne">Nepali</option>
        <option value="mn">Mongolian</option>
        <option value="bs">Bosnian</option>
        <option value="kk">Kazakh</option>
        <option value="sq">Albanian</option>
        <option value="sw">Swahili</option>
        <option value="gl">Galician</option>
        <option value="mr">Marathi</option>
        <option value="pa">Punjabi</option>
        <option value="si">Sinhala</option>
        <option value="km">Khmer</option>
        <option value="sn">Shona</option>
        <option value="yo">Yoruba</option>
        <option value="so">Somali</option>
        <option value="af">Afrikaans</option>
        <option value="oc">Occitan</option>
        <option value="ka">Georgian</option>
        <option value="be">Belarusian</option>
        <option value="tg">Tajik</option>
        <option value="sd">Sindhi</option>
        <option value="gu">Gujarati</option>
        <option value="am">Amharic</option>
        <option value="yi">Yiddish</option>
        <option value="lo">Lao</option>
        <option value="uz">Uzbek</option>
        <option value="fo">Faroese</option>
        <option value="ht">Haitian Creole</option>
        <option value="ps">Pashto</option>
        <option value="tk">Turkmen</option>
        <option value="nn">Nynorsk</option>
        <option value="mt">Maltese</option>
        <option value="sa">Sanskrit</option>
        <option value="lb">Luxembourgish</option>
        <option value="my">Myanmar</option>
        <option value="bo">Tibetan</option>
        <option value="tl">Tagalog</option>
        <option value="mg">Malagasy</option>
        <option value="as">Assamese</option>
        <option value="tt">Tatar</option>
        <option value="haw">Hawaiian</option>
        <option value="ln">Lingala</option>
        <option value="ha">Hausa</option>
        <option value="ba">Bashkir</option>
        <option value="jw">Javanese</option>
        <option value="su">Sundanese</option>
      </select>
    </div>

    <!-- Audio Source Section -->
    <div class="section">
      <label for="source-select">Audio Source</label>
      <select id="source-select">
        <option value="mic" selected>Microphone</option>
        <option value="system">System Audio (Tab/Screen)</option>
        <option value="both">Microphone + System Audio</option>
      </select>
    </div>

    <!-- Recording Section -->
    <div class="section">
      <button id="record-btn" class="btn btn-record" disabled>
        <span class="record-icon"></span>
        <span id="record-label">Start Recording</span>
      </button>
      <div id="recording-indicator" class="recording-indicator hidden">
        <span class="pulse"></span>
        <span id="timer">00:00</span>
      </div>
    </div>

    <!-- Current Transcription -->
    <div id="transcription-section" class="section hidden">
      <h2>Transcription</h2>
      <div id="transcription-result" class="transcription-box"></div>
      <div class="action-row">
        <button id="copy-btn" class="btn btn-small">Copy</button>
        <button id="download-txt-btn" class="btn btn-small">Save TXT</button>
        <button id="download-srt-btn" class="btn btn-small hidden">SRT</button>
        <button id="download-vtt-btn" class="btn btn-small hidden">VTT</button>
        <button id="summarize-btn" class="btn btn-small btn-accent">Summarize</button>
      </div>
    </div>

    <!-- AI Summary -->
    <div id="summary-section" class="section hidden">
      <div class="section-header">
        <h2>AI Summary</h2>
        <span id="summary-status" class="summary-status"></span>
      </div>
      <div id="summary-progress-container" class="progress-container hidden">
        <div id="summary-progress-bar" class="progress-bar"></div>
        <span id="summary-progress-text" class="progress-text">0%</span>
      </div>
      <div id="summary-result" class="transcription-box summary-box"></div>
      <div class="action-row">
        <button id="copy-summary-btn" class="btn btn-small">Copy</button>
        <button id="download-summary-btn" class="btn btn-small">Save TXT</button>
      </div>
    </div>

    <!-- History -->
    <div class="section">
      <div class="section-header">
        <h2>History</h2>
        <button id="clear-history-btn" class="btn btn-small btn-danger">Clear All</button>
      </div>
      <div id="history-list" class="history-list">
        <p class="empty-state">No transcriptions yet</p>
      </div>
    </div>

    <!-- Settings -->
    <div class="section">
      <a href="options.html" target="_blank" class="btn btn-small settings-btn">&#9881; Settings</a>
    </div>
  </div>

  <script src="popup.bundle.js"></script>
</body>
</html>
